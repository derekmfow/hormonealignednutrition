// ── PIN Gate ──────────────────────────────────────────────────────────────────
function PinGate({ children }) {
  const [pin, setPin] = React.useState("");
  const [unlocked, setUnlocked] = React.useState(
    sessionStorage.getItem("ham_unlocked") === "1987"
  );
  const [error, setError] = React.useState(false);

  const tryPin = () => {
    if (pin === CLIENT_PIN) {
      sessionStorage.setItem("ham_unlocked", CLIENT_PIN);
      setUnlocked(true);
    } else {
      setError(true);
      setPin("");
      setTimeout(() => setError(false), 2000);
    }
  };

  if (unlocked) return children;

  return (
    <div style={{ maxWidth: 400, margin: "0 auto", padding: "80px 24px", minHeight: "100vh", background: "#1A1A1A", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
      <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#E8611A", fontWeight: 700, textTransform: "uppercase", marginBottom: 16 }}>Free The Macro</div>
      <div style={{ fontSize: 30, fontWeight: 800, color: "#F5F0EB", marginBottom: 8, letterSpacing: "-0.02em", textAlign: "center" }}>Hormone Aligned<br />Macros</div>
      <div style={{ fontSize: 13, color: "#888", marginBottom: 48, textAlign: "center" }}>Enter your access code</div>
      <input
        type="password"
        value={pin}
        onChange={e => setPin(e.target.value)}
        onKeyDown={e => e.key === "Enter" && tryPin()}
        placeholder="••••"
        autoFocus
        style={{ width: "100%", background: "#252525", border: "1.5px solid " + (error ? "#E84646" : "#333"), borderRadius: 12, padding: "16px", color: "#F5F0EB", fontSize: 24, textAlign: "center", letterSpacing: "0.4em", outline: "none", marginBottom: 12, boxSizing: "border-box", transition: "border-color 0.2s" }}
      />
      {error && <p style={{ color: "#E84646", fontSize: 13, marginBottom: 12 }}>Incorrect — try again</p>}
      <button type="button" onClick={tryPin}
        style={{ width: "100%", padding: 16, background: "#E8611A", color: "#fff", border: "none", borderRadius: 12, fontSize: 16, fontWeight: 800, cursor: "pointer", fontFamily: "Georgia, serif" }}>
        Unlock
      </button>
    </div>
  );
}

function pctToGrams(pct, macro, cal) {
  return Math.round((cal * pct / 100) / (macro === "fat" ? 9 : 4));
}
function gramsToCalPct(g, macro, cal) {
  if (!cal) return 0;
  return Math.round((g * (macro === "fat" ? 9 : 4) / cal) * 100);
}

const DEREK_INGREDIENTS = "DEREK APPROVED LIST: Proteins: 93/7 grass-fed beef (L2), chicken breast, turkey, canned tuna (L1), tuna steak (L2), eggs, egg whites (fast-digesting, great for GLP-1), Greek yogurt full-fat or fat-free, kefir. Dairy/Fat: real butter (L2), ghee (L2), fat-free cheese (L1), Parmigiano-Reggiano block self-shredded (L2, no anti-caking agents). Carbs: white/jasmine/black rice, Einkhorn wheat flour (L2), Zego oats (L2), cream of rice, homemade sourdough (L2), clean-label wraps/taco shells (L1), pan-popped popcorn NOT bag (L2). Fruits: berries, bananas (pre/post workout), pineapple. Condiments: Siete seasonings (L2), single-ingredient spices (L2), monk fruit powder, maple syrup (moderation), PB Fit (L1). Gut health: sauerkraut, kefir. Sweets: low-cal options with clean sweeteners (no maltitol/sorbitol). SWAP RULE: Always offer L1 easy switch AND L2 less processed. Never say healthier. Say less processed. Client picks — curiosity not compliance.";

async function apiCall(payload) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_KEY,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function readScreenshot(base64, mimeType) {
  const safe = (mimeType && ["image/jpeg","image/png","image/gif","image/webp"].includes(mimeType)) ? mimeType : "image/jpeg";
  const data = await apiCall({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    system: 'Read this nutrition tracking app screenshot. Extract every meal and food item. Output valid JSON only: {"meals":[{"name":"Breakfast","items":"food1, food2"}],"totals":{"calories":0,"protein":0,"carbs":0,"fat":0}}. Use Meal 1/2/3 if names unclear. Set totals to 0 if not visible.',
    messages: [{ role: "user", content: [
      { type: "image", source: { type: "base64", media_type: safe, data: base64 } },
      { type: "text", text: "Extract all meals and food items. Return JSON only." }
    ]}]
  });
  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try { return JSON.parse(text.replace(/```json|```/g, "").trim()); }
  catch { return null; }
}

async function analyzeMeals(meals, goal, targets, medications) {

  const userMsg = "Goal: " + goal + "\nTargets: " + targets.protein + "g protein, " + targets.carbs + "g carbs, " + targets.fat + "g fat (" + targets.calories + " cal)\n" + medNote + "\n\nMeals:\n" + mealList + "\n\nAnalyze and return JSON.";

  const sysMsg = "You are the AI coaching engine for Hormone Aligned Macros by Derek Fowler — 16-year nutrition coach specializing in HRT and GLP-1 clients who lift weights.\n\nCORE RULES:\n- MACRO COMPLIANCE IS THE FIRST PRIORITY. Hitting targets = a WIN. Celebrate it.\n- Only suggest swaps when something is genuinely off. Never manufacture suggestions.\n- Derek's method: gradual ingredient reduction toward single-ingredient whole foods while keeping meals intact and tasting good. Long-term process. Do not rush.\n- If macros are on target and food is reasonable, return strong status with empty swaps. Acknowledge the win.\n- Never say healthier. Say less processed.\n- Protein minimum 1g per lb bodyweight daily. In deficit 1.1-1.3g. Minimum 30g every 4 hours.\n- If any meal under 30g protein that is the first fix. Flag it.\n- Never cut protein to hit calories.\n\nHRT: increased appetite first 1-3 months is normal. May need more carbs/protein. Do not aggressively cut during stabilization.\nGLP-1: hunger suppressed pharmacologically. Must hit protein even with no appetite. Avoid high-fat high-volume combos. Fast-digesting proteins for low appetite.\n\n" + DEREK_INGREDIENTS + "\n\nDUAL SWAP FORMAT: Every swap offers two options:\n- swap_easy: Level 1 easy switch\n- swap_clean: Level 2 less processed\nOnly include swaps when genuinely needed.\n\nOUTPUT valid JSON only:\n{\"summary\":\"2-3 sentences. Lead with congratulations if macros on target. Lead with biggest fix if off. Never say healthier.\",\"flags\":[\"urgent issues only\"],\"score\":{\"protein\":0,\"carbs\":0,\"fat\":0,\"overall\":0} — ALL SCORES ARE 0-100. Never use 1-10 scale. 100 = perfect target hit. 80+ = strong. 55-79 = aligned. Below 55 = needs work.,\"meals\":[{\"meal\":\"name\",\"status\":\"needs_work|aligned|strong\",\"note\":\"1-2 sentences\",\"swaps\":[{\"swap_out\":\"ingredient\",\"why\":\"reason\",\"swap_easy\":{\"name\":\"...\",\"note\":\"...\",\"impact\":\"...\"},\"swap_clean\":{\"name\":\"...\",\"note\":\"...\",\"impact\":\"...\"}}]}]}";

  const data = await apiCall({
    model: "claude-sonnet-4-20250514",
    max_tokens: 2500,
    system: sysMsg,

  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try { return JSON.parse(text.replace(/```json|```/g, "").trim()); }
  catch { return null; }
}

function Tag({ children, color }) {
  const c = color || BRAND.orange;
  return <span style={{ background: c + "22", color: c, fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20, letterSpacing: "0.05em", textTransform: "uppercase" }}>{children}</span>;
}

function Toggle({ value, onChange, options }) {

    <div style={{ display: "inline-flex", background: "#252525", borderRadius: 8, padding: 3, gap: 2 }}>
      {options.map(o => (
        <button key={o.value} type="button" onClick={() => onChange(o.value)}

}

function MacroBar({ label, value, max, color }) {
  const w = Math.min(100, max > 0 ? Math.round((value / max) * 100) : 0);
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: BRAND.muted, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>{label}</span>
        <span style={{ fontSize: 12, color: BRAND.offwhite, fontWeight: 700 }}>{value}g <span style={{ color: BRAND.muted }}>/ {max}g</span></span>
      </div>
      <div style={{ height: 6, background: "#333", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: w + "%", height: "100%", background: color, borderRadius: 3, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}

function ScoreRing({ value, label }) {
  const r = 28, c = 2 * Math.PI * r, fill = c - (c * (value || 0) / 100);
  const col = value >= 80 ? "#4CAF82" : value >= 55 ? BRAND.orange : "#E84646";
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
      <svg width={70} height={70} viewBox="0 0 70 70">
        <circle cx={35} cy={35} r={r} fill="none" stroke="#333" strokeWidth={5} />
        <circle cx={35} cy={35} r={r} fill="none" stroke={col} strokeWidth={5} strokeDasharray={c} strokeDashoffset={fill} strokeLinecap="round" transform="rotate(-90 35 35)" style={{ transition: "stroke-dashoffset 0.8s ease" }} />
        <text x={35} y={39} textAnchor="middle" fill={col} fontSize={14} fontWeight={800}>{value ?? "—"}</text>
      </svg>
      <span style={{ fontSize: 11, color: BRAND.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</span>
    </div>
  );
}

function SmallRing({ value }) {
  const r = 20, c = 2 * Math.PI * r, fill = c - (c * (value || 0) / 100);
  const col = value >= 80 ? "#4CAF82" : value >= 55 ? BRAND.orange : "#E84646";
  return (
    <svg width={48} height={48} viewBox="0 0 48 48">

}

function SwapCard({ swap }) {
  const sc = { needs_work: "#E84646", aligned: BRAND.orange, strong: "#4CAF82" };
  const [picked, setPicked] = useState(null);
  const [selected, setSelected] = useState(false);
  const [saved, setSaved] = useState(false);
  const pressTimer = useRef(null);
  const borderCol = selected ? BRAND.orange : (sc[swap.status] || BRAND.orange);

  const handlePressStart = () => {
    pressTimer.current = setTimeout(() => {
      setSelected(true);
    }, 500);
  };
  const handlePressEnd = () => {
    clearTimeout(pressTimer.current);
  };

  const handleSave = async () => {
    const el = document.getElementById("card-" + swap.meal.replace(/\s/g,""));
    if (!el) return;
    try {
      const canvas = document.createElement("canvas");
      const scale = 2;
      const rect = el.getBoundingClientRect();
      canvas.width = rect.width * scale;
      canvas.height = rect.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = "#1A1A1A";
      ctx.fillRect(0, 0, rect.width, rect.height);
      const data = canvas.toDataURL("image/png");
      const link = document.createElement("a");
      link.download = swap.meal.replace(/\s/g,"-") + "-analysis.png";
      link.href = data;
      link.click();
      setSaved(true);
      setTimeout(() => { setSaved(false); setSelected(false); }, 2000);
    } catch(e) {
      // Fallback: just deselect
      setSelected(false);
    }
  };

  return (
    <div id={"card-" + swap.meal.replace(/\s/g,"")}
      onMouseDown={handlePressStart} onMouseUp={handlePressEnd} onMouseLeave={handlePressEnd}
      onTouchStart={handlePressStart} onTouchEnd={handlePressEnd}
      style={{ background: selected ? "#252535" : "#252525", borderRadius: 12, padding: 14, marginBottom: 10, borderLeft: "3px solid " + borderCol, transition: "all 0.2s", boxShadow: selected ? "0 0 0 2px " + BRAND.orange + "44" : "none" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontWeight: 700, fontSize: 14, color: BRAND.offwhite }}>{swap.meal}</span>
        {selected && (
          <button type="button" onClick={handleSave}
            style={{ background: BRAND.orange, border: "none", borderRadius: 8, padding: "4px 10px", color: "#fff", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>
            {saved ? "✓ Saved" : "Save Card"}
          </button>
        )}
      </div>
      {selected && !saved && <p style={{ fontSize: 11, color: BRAND.orange, margin: "0 0 8px", fontStyle: "italic" }}>Tap Save Card to download this meal card.</p>}
      <p style={{ fontSize: 12, color: BRAND.muted, margin: "0 0 12px", lineHeight: 1.5 }}>{swap.note}</p>
      {swap.swaps && swap.swaps.map((s, i) => (
        <div key={i} style={{ marginBottom: i < swap.swaps.length - 1 ? 14 : 0 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: "#E84646", textDecoration: "line-through", opacity: 0.75 }}>{s.swap_out}</span>
            <span style={{ fontSize: 12, color: BRAND.muted }}>— {s.why}</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button type="button" onClick={() => setPicked(picked === i + "-easy" ? null : i + "-easy")}
              style={{ background: picked === i + "-easy" ? "#2A3A2A" : "#1A1A1A", border: "1.5px solid " + (picked === i + "-easy" ? "#4CAF82" : "#333"), borderRadius: 10, padding: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: "#4CAF82", marginBottom: 4 }}>Easy Switch</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: BRAND.offwhite, marginBottom: 4, lineHeight: 1.3 }}>{s.swap_easy && s.swap_easy.name}</div>
              <div style={{ fontSize: 11, color: BRAND.muted, lineHeight: 1.4, marginBottom: 6 }}>{s.swap_easy && s.swap_easy.note}</div>
              <Tag color="#4CAF82">{s.swap_easy && s.swap_easy.impact}</Tag>
            </button>
            <button type="button" onClick={() => setPicked(picked === i + "-clean" ? null : i + "-clean")}
              style={{ background: picked === i + "-clean" ? "#2A2A3A" : "#1A1A1A", border: "1.5px solid " + (picked === i + "-clean" ? BRAND.orange : "#333"), borderRadius: 10, padding: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: BRAND.orange, marginBottom: 4 }}>You could also try…</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: BRAND.offwhite, marginBottom: 4, lineHeight: 1.3 }}>{s.swap_clean && s.swap_clean.name}</div>
              <div style={{ fontSize: 11, color: BRAND.muted, lineHeight: 1.4, marginBottom: 6 }}>{s.swap_clean && s.swap_clean.note}</div>
              <Tag color={BRAND.orange}>{s.swap_clean && s.swap_clean.impact}</Tag>
            </button>
          </div>
          {picked === null || !picked.startsWith(i + "-") ? (
            <p style={{ fontSize: 11, color: BRAND.muted, margin: "8px 0 0", textAlign: "center", fontStyle: "italic" }}>Tap either one — you pick.</p>
          ) : (
            <div style={{ marginTop: 8, padding: "8px 12px", background: "#1E1E1E", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 14 }}>{picked.endsWith("-easy") ? "✓" : "⭐"}</span>
              <span style={{ fontSize: 12, color: BRAND.offwhite }}>{picked.endsWith("-easy") ? "Easy switch noted. Solid move." : "Less processed version. Worth trying at least once."}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

        : filteredRecipes.map((r, i) => <CookbookCard key={i} recipe={r} />)
      }
      <Nav />
    </div>
  );

  return null;
}

ReactDOM.render(<PinGate><HamApp /></PinGate>, document.getElementById("root"));
</script>
</body>
</html>
