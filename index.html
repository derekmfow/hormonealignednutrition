function PinGate({ children }) {
  const [pin, setPin] = React.useState("");
  const [unlocked, setUnlocked] = React.useState(
    sessionStorage.getItem("ham_unlocked") === "1987"
  );
  const [error, setError] = React.useState(false);
  const [quickCode, setQuickCode] = React.useState("");
  const [quickCodePending, setQuickCodePending] = React.useState(null);

  const tryPin = () => {
    if (pin === CLIENT_PIN) {
      sessionStorage.setItem("ham_unlocked", CLIENT_PIN);
      if (quickCode.trim()) setQuickCodePending(quickCode.trim());
      setUnlocked(true);
    } else {
      setError(true);
      setPin("");
      setTimeout(() => setError(false), 2000);
    }
  };

  const tryQuickLoad = () => {
    if (!quickCode.trim()) return;
    if (pin === CLIENT_PIN || sessionStorage.getItem("ham_unlocked") === "1987") {
      setQuickCodePending(quickCode.trim());
      sessionStorage.setItem("ham_unlocked", CLIENT_PIN);
      setUnlocked(true);
    } else {
      setError(true);
      setTimeout(() => setError(false), 2000);
    }
  };

  if (unlocked) return React.cloneElement(children, { pendingProfileCode: quickCodePending });

  return (
    <div style={{ maxWidth: 400, margin: "0 auto", padding: "80px 24px", minHeight: "100vh", background: "#1A1A1A", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
      <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#E8611A", fontWeight: 700, textTransform: "uppercase", marginBottom: 16 }}>Free The Macro</div>
      <div style={{ fontSize: 30, fontWeight: 800, color: "#F5F0EB", marginBottom: 8, letterSpacing: "-0.02em", textAlign: "center" }}>Hormone Aligned<br />Macros</div>
      <div style={{ fontSize: 13, color: "#888", marginBottom: 48, textAlign: "center" }}>Enter your access code</div>
      <input
        type="password"
        value={pin}
        onChange={e => setPin(e.target.value)}
        onKeyDown={e => e.key === "Enter" && tryPin()}
        placeholder="••••"
        autoFocus
        style={{ width: "100%", background: "#252525", border: "1.5px solid " + (error ? "#E84646" : "#333"), borderRadius: 12, padding: "16px", color: "#F5F0EB", fontSize: 24, textAlign: "center", letterSpacing: "0.4em", outline: "none", marginBottom: 12, boxSizing: "border-box", transition: "border-color 0.2s" }}
      />
      {error && <p style={{ color: "#E84646", fontSize: 13, marginBottom: 12 }}>Incorrect — try again</p>}
      <button type="button" onClick={tryPin}
        style={{ width: "100%", padding: 16, background: "#E8611A", color: "#fff", border: "none", borderRadius: 12, fontSize: 16, fontWeight: 800, cursor: "pointer", fontFamily: "Georgia, serif" }}>
        Unlock
      </button>


    </div>
  );
}

function pctToGrams(pct, macro, cal) {
  return Math.round((cal * pct / 100) / (macro === "fat" ? 9 : 4));
}
function gramsToCalPct(g, macro, cal) {
  if (!cal) return 0;
  return Math.round((g * (macro === "fat" ? 9 : 4) / cal) * 100);
}

async function apiCall(payload) {
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function readScreenshot(base64, mimeType) {
  const safe = (mimeType && ["image/jpeg","image/png","image/gif","image/webp"].includes(mimeType)) ? mimeType : "image/jpeg";
  const data = await apiCall({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    system: 'Extract meals from nutrition app screenshot. JSON only: {"meals":[{"name":"Meal 1","items":"food1"}],"totals":{"calories":0,"protein":0,"carbs":0,"fat":0}}. Meal 1/2/3 if unclear.',
    messages: [{ role: "user", content: [
      { type: "image", source: { type: "base64", media_type: safe, data: base64 } },
      { type: "text", text: "Extract all meals and food items. Return JSON only." }
    ]}]
  });
  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try { return JSON.parse(text.replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g, "").trim()); }
  catch { return null; }
}

async function analyzeMeals(meals, goal, targets, medications) {
  const medNote = medications.length ? "Protocols: "+medications.join(",") : "";
  const mealList = meals.map((m, i) => "Meal " + (i+1) + " — " + m.name + ": " + m.items).join("\n");
  const userMsg = "Goal:"+goal+" Targets:"+targets.protein+"g P,"+targets.carbs+"g C,"+targets.fat+"g F,"+targets.calories+"cal\n"+medNote+"\nMeals:\n"+mealList;

  const sysMsg = "HAM coach. Hit macros=WIN, celebrate. Only swap when off. Less processed not healthier. Protein 1g/lb, 30g/meal, flag if under, never cut protein. No deli/hot dogs. No Cheez-Its/Goldfish/Ritz.\nHRT: appetite up 1-3mo normal, may need more carbs/protein.\nGLP-1: must hit protein, avoid high-fat+volume, use egg whites/shrimp/whey.\n"+DEREK_INGREDIENTS+"\nswap_easy=L1, swap_clean=L2. Include one score-explanation line per macro in summary.\nJSON:{\"summary\":\"coaching+score notes\",\"flags\":[],\"score\":{\"protein\":0,\"carbs\":0,\"fat\":0,\"overall\":0},\"meals\":[{\"meal\":\"\",\"status\":\"needs_work|aligned|strong\",\"note\":\"\",\"swaps\":[{\"swap_out\":\"\",\"why\":\"\",\"swap_easy\":{\"name\":\"\",\"note\":\"\",\"impact\":\"\"},\"swap_clean\":{\"name\":\"\",\"note\":\"\",\"impact\":\"\"}}]}]} 0-100 scores.";

  const data = await apiCall({
    model: "claude-sonnet-4-20250514",
    max_tokens: 2500,
    system: sysMsg,
    messages: [{ role: "user", content: userMsg }]
  });
  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try { return JSON.parse(text.replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g, "").trim()); }
  catch { return null; }
}

  const w = Math.min(100, max > 0 ? Math.round((value / max) * 100) : 0);
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: BRAND.muted, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>{label}</span>

        <div style={{ width: w + "%", height: "100%", background: color, borderRadius: 3, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}

function SwapCard({ swap }) {
  const sc = { needs_work: "#E84646", aligned: BRAND.orange, strong: "#4CAF82" };
  const [picked, setPicked] = useState(null);
  const [selected, setSelected] = useState(false);
  const [saved, setSaved] = useState(false);
  const pressTimer = useRef(null);
  const borderCol = selected ? BRAND.orange : (sc[swap.status] || BRAND.orange);

  const handlePressStart = () => {
    pressTimer.current = setTimeout(() => {
      setSelected(true);
    }, 500);
  };
  const handlePressEnd = () => {
    clearTimeout(pressTimer.current);
  };

  const handleSave = async () => {
    const el = document.getElementById("card-" + swap.meal.replace(/\s/g,""));
    if (!el) return;
    try {
      const canvas = document.createElement("canvas");
      const scale = 2;
      const rect = el.getBoundingClientRect();
      canvas.width = rect.width * scale;
      canvas.height = rect.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = "#1A1A1A";
      ctx.fillRect(0, 0, rect.width, rect.height);
      const data = canvas.toDataURL("image/png");
      const link = document.createElement("a");
      link.download = swap.meal.replace(/\s/g,"-") + "-analysis.png";
      link.href = data;
      link.click();
      setSaved(true);
      setTimeout(() => { setSaved(false); setSelected(false); }, 2000);
    } catch(e) {
      // Fallback: just deselect
      setSelected(false);
    }
  };

  return (
    <div id={"card-" + swap.meal.replace(/\s/g,"")}
      onMouseDown={handlePressStart} onMouseUp={handlePressEnd} onMouseLeave={handlePressEnd}
      onTouchStart={handlePressStart} onTouchEnd={handlePressEnd}
      style={{ background: selected ? "#252535" : "#252525", borderRadius: 12, padding: 14, marginBottom: 10, borderLeft: "3px solid " + borderCol, transition: "all 0.2s", boxShadow: selected ? "0 0 0 2px " + BRAND.orange + "44" : "none" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontWeight: 700, fontSize: 14, color: BRAND.offwhite }}>{swap.meal}</span>
        {selected && (
          <button type="button" onClick={handleSave}
            style={{ background: BRAND.orange, border: "none", borderRadius: 8, padding: "4px 10px", color: "#fff", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>
            {saved ? "✓ Saved" : "Save Card"}
          </button>
        )}
      </div>
      {selected && !saved && <p style={{ fontSize: 11, color: BRAND.orange, margin: "0 0 8px", fontStyle: "italic" }}>Tap Save Card to download this meal card.</p>}
      <p style={{ fontSize: 12, color: BRAND.muted, margin: "0 0 12px", lineHeight: 1.5 }}>{swap.note}</p>
      {swap.swaps && swap.swaps.map((s, i) => (
        <div key={i} style={{ marginBottom: i < swap.swaps.length - 1 ? 14 : 0 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: "#E84646", textDecoration: "line-through", opacity: 0.75 }}>{s.swap_out}</span>
            <span style={{ fontSize: 12, color: BRAND.muted }}>— {s.why}</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button type="button" onClick={() => setPicked(picked === i + "-easy" ? null : i + "-easy")}
              style={{ background: picked === i + "-easy" ? "#2A3A2A" : "#1A1A1A", border: "1.5px solid " + (picked === i + "-easy" ? "#4CAF82" : "#333"), borderRadius: 10, padding: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: "#4CAF82", marginBottom: 4 }}>Easy Switch</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: BRAND.offwhite, marginBottom: 4, lineHeight: 1.3 }}>{s.swap_easy && s.swap_easy.name}</div>
              <div style={{ fontSize: 11, color: BRAND.muted, lineHeight: 1.4, marginBottom: 6 }}>{s.swap_easy && s.swap_easy.note}</div>
              <Tag color="#4CAF82">{s.swap_easy && s.swap_easy.impact}</Tag>
            </button>
            <button type="button" onClick={() => setPicked(picked === i + "-clean" ? null : i + "-clean")}
              style={{ background: picked === i + "-clean" ? "#2A2A3A" : "#1A1A1A", border: "1.5px solid " + (picked === i + "-clean" ? BRAND.orange : "#333"), borderRadius: 10, padding: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: BRAND.orange, marginBottom: 4 }}>You could also try…</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: BRAND.offwhite, marginBottom: 4, lineHeight: 1.3 }}>{s.swap_clean && s.swap_clean.name}</div>
              <div style={{ fontSize: 11, color: BRAND.muted, lineHeight: 1.4, marginBottom: 6 }}>{s.swap_clean && s.swap_clean.note}</div>
              <Tag color={BRAND.orange}>{s.swap_clean && s.swap_clean.impact}</Tag>
            </button>
          </div>
          {picked === null || !picked.startsWith(i + "-") ? (
            <p style={{ fontSize: 11, color: BRAND.muted, margin: "8px 0 0", textAlign: "center", fontStyle: "italic" }}>Tap either one — you pick.</p>
          ) : (
            <div style={{ marginTop: 8, padding: "8px 12px", background: "#1E1E1E", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 14 }}>{picked.endsWith("-easy") ? "✓" : "⭐"}</span>
              <span style={{ fontSize: 12, color: BRAND.offwhite }}>{picked.endsWith("-easy") ? "Easy switch noted. Solid move." : "Less processed version. Worth trying at least once."}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* =========================================================
   COACHING CTA — floating pill that points users to Buffalo Method coaching.

   Styled to match the Buffalo Method brand (white modal, Barlow Condensed
   display, orange accents) so it feels like a distinct "product-within-a-product"
   sitting inside HAM. Pill remains dark to work on HAM's dark background.

   POSTs inquiries to the Buffalo Method coaching backend. CORS is locked to
   this origin (hormonealignednutrition.onrender.com) so the request only
   works from within HAM. Honeypot field "website" is hidden from real users
   — bots fill it, the server silently drops those.

   isCoachingClient prop: pass true for users who are already Derek's coaching
   clients and the CTA hides itself. Currently defaulted to false (everyone
   sees it) — wire the real check when ready.
   ========================================================= */
const COACHING_API_URL = "https://buffalocoach.onrender.com/api/inquiries";
const COACHING_LINKS = {
  skool:    "https://www.skool.com/hormonealigned-macros-9379/about",
  linktree: "https://linktr.ee/hormonealignednutrition",
};

// Font stacks so everything downstream refers to one source of truth.
const BM_DISPLAY = '"Barlow Condensed", "Arial Narrow", Impact, sans-serif';
const BM_BODY    = '"Barlow", system-ui, -apple-system, sans-serif';

function CoachingCTA({ isCoachingClient = false }) {
  const [open, setOpen] = useState(false);
  if (isCoachingClient) return null;

  // Fixed top-right so it appears on every screen without modifying HAM's
  // per-screen headers. top value includes safe-area-inset for iOS notches
  // when installed as a PWA. The whole pill is one clickable button.
  const pillBtn = {
    position: "fixed",
    top: "max(12px, env(safe-area-inset-top, 12px))",
    right: 12,
    zIndex: 40,
    background: "#E8611A",
    color: "#fff",
    border: "none",
    borderRadius: 9999,
    padding: "7px 14px 7px 10px",
    fontSize: 11,
    fontWeight: 700,
    letterSpacing: "0.12em",
    textTransform: "uppercase",
    fontFamily: BM_DISPLAY,
    cursor: "pointer",
    boxShadow: "0 6px 16px rgba(0,0,0,0.4)",
    display: "inline-flex",
    alignItems: "center",
    gap: 8,
    lineHeight: 1,
  };
  const dot = { width: 6, height: 6, background: "#fff", borderRadius: 9999, flexShrink: 0 };

  return (
    <React.Fragment>
      <button onClick={()=>setOpen(true)} style={pillBtn} aria-label="Work with Derek 1:1">
        <span style={dot}></span>
        1:1 Coaching
      </button>
      {open && <InquiryModal onClose={()=>setOpen(false)}/>}
    </React.Fragment>
  );
}

function InquiryModal({ onClose }) {
  const [form, setForm] = useState({ name:"", email:"", context:"", website:"" });
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  React.useEffect(() => {
    const h = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [onClose]);

  const submitInquiry = async () => {
    if (submitting) return;
    const e = {};
    if (!form.name.trim())  e.name  = "Required";
    if (!form.email.trim()) e.email = "Required";
    else if (!/^\S+@\S+\.\S+$/.test(form.email)) e.email = "Invalid email";
    if (Object.keys(e).length) return setErrors(e);

    setSubmitting(true);
    setSubmitError("");
    try {
      const res = await fetch(COACHING_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name:    form.name.trim(),
          email:   form.email.trim(),
          message: form.context.trim(),
          website: form.website,
          source:  "ham_app",
        }),
      });
      if (res.ok) { setSubmitted(true); return; }
      let serverMsg = "";
      try { const data = await res.json(); serverMsg = data.error || ""; } catch {}
      if (res.status === 429) {
        setSubmitError(serverMsg || "You've sent a few of these recently. Give it an hour and try again, or reach Derek via the links below.");
      } else {
        setSubmitError(serverMsg || "Something went wrong sending that. Try again in a minute?");
      }
    } catch (err) {
      console.error("[inquiry] network error:", err);
      setSubmitError("Couldn't reach the server. Check your connection and try again, or reach Derek via the links below.");
    } finally {
      setSubmitting(false);
    }
  };

  // White modal / Buffalo Method brand — matches the design from the uploaded CTA file.
  // zIndex 200 keeps it above HAM's bottom nav (z-index 100) so the Skool/Linktree
  // links at the bottom of the modal aren't covered by Setup/Analyze/Results/etc.
  const backdrop  = { position: "fixed", inset: 0, background: "rgba(26,26,26,0.7)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: 0, fontFamily: BM_BODY };
  const card      = { background: "#fff", color: "#1A1A1A", borderTopLeftRadius: 16, borderTopRightRadius: 16, boxShadow: "0 -10px 40px rgba(0,0,0,0.5)", width: "100%", maxWidth: 512, maxHeight: "92vh", overflowY: "auto" };

  const closeBtn  = { position: "absolute", top: 14, right: 14, background: "transparent", color: "#a3a3a3", border: "none", cursor: "pointer", padding: 6, display: "flex", alignItems: "center", justifyContent: "center" };
  const brandRow  = { display: "inline-flex", alignItems: "center", gap: 8, marginBottom: 12 };
  const brandDot  = { width: 8, height: 8, background: "#E8611A", borderRadius: 9999 };
  const brandTxt  = { fontFamily: BM_DISPLAY, fontSize: 12, fontWeight: 700, letterSpacing: "0.2em", color: "#737373", textTransform: "uppercase" };
  const h2        = { fontFamily: BM_DISPLAY, fontSize: 36, fontWeight: 700, lineHeight: 0.95, marginBottom: 20, color: "#1A1A1A", letterSpacing: "0.01em" };
  const para      = { color: "#404040", marginBottom: 24, lineHeight: 1.6, fontSize: 15 };
  const fieldGrp  = { marginBottom: 16 };
  const fieldLbl  = { display: "block", fontFamily: BM_DISPLAY, fontSize: 12, fontWeight: 600, letterSpacing: "0.12em", color: "#525252", marginBottom: 6, textTransform: "uppercase" };
  const fieldInp  = { width: "100%", background: "#fff", border: "1px solid #e5e5e5", borderRadius: 4, padding: "10px 12px", color: "#1A1A1A", fontSize: 15, outline: "none", boxSizing: "border-box", fontFamily: BM_BODY };

  const primary   = { width: "100%", padding: "14px", background: submitting ? "#d4d4d4" : "#E8611A", color: "#fff", border: "none", borderRadius: 4, fontSize: 14, fontWeight: 700, cursor: submitting ? "wait" : "pointer", fontFamily: BM_DISPLAY, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 16 };

  const divTxt    = { fontFamily: BM_DISPLAY, fontSize: 11, fontWeight: 600, letterSpacing: "0.15em", color: "#a3a3a3", textTransform: "uppercase" };
  const secondary = { display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", padding: "12px", background: "#fff", color: "#1A1A1A", border: "1px solid #d4d4d4", borderRadius: 4, fontFamily: BM_DISPLAY, fontSize: 14, fontWeight: 700, textAlign: "center", textDecoration: "none", letterSpacing: "0.12em", textTransform: "uppercase", boxSizing: "border-box" };
  const tertiary  = { display: "flex", alignItems: "center", justifyContent: "center", gap: 6, width: "100%", padding: "8px", marginTop: 8, background: "transparent", color: "#737373", border: "none", fontFamily: BM_DISPLAY, fontSize: 13, fontWeight: 600, textAlign: "center", textDecoration: "none", letterSpacing: "0.12em", textTransform: "uppercase", boxSizing: "border-box" };
  const honeypot  = { position: "absolute", left: "-9999px", width: 1, height: 1, overflow: "hidden" };

    <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

      <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/>
    </svg>

  return (

      <div style={card} onClick={(e)=>e.stopPropagation()}>
        {!submitted ? (
          <div style={body}>
            <button onClick={onClose} style={closeBtn} aria-label="Close">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/>
              </svg>
            </button>

            <div style={brandRow}>
              <div style={brandDot}></div>
              <span style={brandTxt}>The Buffalo Method</span>
            </div>
            <h2 style={h2}>Work with Derek 1:1</h2>
            <p style={para}>
              Coaching for lifters — whether or not you're on GLP-1, HRT, or even "enhanced." Daily meal uploads, photo feedback, weekly check-ins. Nutrition and lifting programs built for you, by us, so that you own your results. I help clear the noise so you can finally focus on what matters to you.
            </p>

            <div style={fieldGrp}>
              <label style={fieldLbl}>Your name</label>
              <input value={form.name}
                onChange={(e)=>{ setForm({...form, name:e.target.value}); setErrors({...errors, name:null}); }}
                onFocus={(e)=>Object.assign(e.target.style, fieldInpFocus)}
                onBlur={(e)=>{ e.target.style.borderColor = "#e5e5e5"; }}

              {errors.name && <p style={fieldErr}>{errors.name}</p>}

            <div style={fieldGrp}>

            {/* Honeypot — hidden from users, tempting for bots */}
            <div aria-hidden="true" style={honeypot}>

            {submitError && <div style={errorBox}>{submitError}</div>}

            <button onClick={submitInquiry} disabled={submitting} style={primary}>

            <div style={divider}>

  const [profileStatus, setProfileStatus] = useState(null);
  const [profileLoading, setProfileLoading] = useState(false);

  const saveProfileToServer = async () => {
    if (!profileCode.trim() || profileCode.trim().length < 3) {
      setProfileStatus({ type: "error", msg: "Code must be at least 3 characters." });
      return;
    }
    setProfileLoading(true);
    try {
      const full = { ...profile, goal, targets, medications, stats, activity };
      const res = await fetch("/api/profile/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: profileCode.trim(), profile: full })
      });
      const data = await res.json();
      if (data.success) {
        setProfileStatus({ type: "success", msg: "Profile saved! Your code is: " + profileCode.trim() });
        setProfileSaved(true);
        setTimeout(() => setProfileSaved(false), 3000);
      } else {
        setProfileStatus({ type: "error", msg: data.error || "Could not save profile." });
      }
    } catch(e) {
      setProfileStatus({ type: "error", msg: "Connection error. Try again." });
    }
    setProfileLoading(false);
  };

  const loadProfileFromServer = async () => {
    if (!profileCodeInput.trim()) return;
    setProfileLoading(true);
    setProfileStatus(null);
    try {
      const res = await fetch("/api/profile/load", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: profileCodeInput.trim() })
      });
      const data = await res.json();
      if (data.success && data.profile) {
        const p = data.profile;
        setProfile({ name: p.name || "", training: p.training || "", notes: p.notes || "" });
        if (p.goal) setGoal(p.goal);
        if (p.targets) setTargets(p.targets);
        if (p.medications) setMedications(p.medications);
        if (p.stats) setStats(p.stats);
        if (p.activity) setActivity(p.activity);
        setProfileCode(profileCodeInput.trim());
        setProfileStatus({ type: "success", msg: "Profile loaded." });
      } else {
        setProfileStatus({ type: "error", msg: "No profile found for that code." });
      }

    }

  };

  const MEAL_BUILDER_CARBS=["Oats","White Rice","Black Rice","Cream of Rice","Taco Shells/Wraps","Black Beans","Fruit","Potatoes"];

    setBuilderCarb("");setBuilderProtein("");setBuilderFat("");setBuilderOpen(false);
  };



  const [loadingMsg, setLoadingMsg] = useState("");
  const restCache = useRef({});
  const fileRef = useRef(null);

  const MED_OPTIONS = ["HRT — Testosterone", "HRT — Estrogen / Progesterone", "GLP-1 (Ozempic / Wegovy / Mounjaro)", "Other peptide protocol"];
  const toggleMed = m => setMedications(p => p.includes(m) ? p.filter(x => x !== m) : [...p, m]);

  const applyGoalDefaults = (g, baseCal) => {
    const p = MACRO_PROFILES[g];
    const cal = baseCal || targets.calories || 1800;
    setPctTargets({ protein: p.protein, carbs: p.carbs, fat: p.fat });
    setTargets({ calories: cal, protein: pctToGrams(p.protein,"protein",cal), carbs: pctToGrams(p.carbs,"carbs",cal), fat: pctToGrams(p.fat,"fat",cal) });
  };

  const calcTDEE = () => {
    const { age, weight, height_ft, height_in, sex } = stats;
    if (!age || !weight || height_ft === "") return;
    const wKg = parseFloat(weight) * 0.453592;
    const hCm = (parseFloat(height_ft) * 12 + parseFloat(height_in || 0)) * 2.54;
    const a = parseFloat(age);
    const bmr = sex === "male" ? 10*wKg + 6.25*hCm - 5*a + 5 : 10*wKg + 6.25*hCm - 5*a - 161;
    const tdeeVal = Math.round(bmr * ACTIVITY_MULTIPLIERS[activity]);

  const handlePctChange = (macro, val) => {

    setPctTargets(p => ({ ...p, [macro]: v }));
    setTargets(t => ({ ...t, [macro]: pctToGrams(v, macro, t.calories) }));

        <>
          <div style={{ ...S.card, borderLeft: "3px solid " + BRAND.orange }}>
            <p style={{ color: BRAND.offwhite, fontSize: 14, lineHeight: 1.7, margin: "0 0 4px" }}>Quality-first list for <strong>{shopList.meals && shopList.meals.join(", ")}</strong></p>
            <p style={{ color: BRAND.muted, fontSize: 12, margin: 0 }}>Ingredients chosen for minimal processing and macro alignment.</p>
          </div>

          {shopList.sections && shopList.sections.map((sec, i) => (
            <div key={i} style={S.card}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                <span style={{ fontSize: 20 }}>{sec.emoji}</span>
                <span style={{ fontWeight: 800, fontSize: 14, color: BRAND.offwhite, textTransform: "uppercase", letterSpacing: "0.06em" }}>{sec.name}</span>
              </div>
              {sec.items && sec.items.map((item, j) => (
                <div key={j} style={{ paddingBottom: 10, marginBottom: 10, borderBottom: j < sec.items.length - 1 ? "1px solid #2A2A2A" : "none" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <span style={{ fontSize: 14, color: BRAND.offwhite, fontWeight: 600, flex: 1 }}>{item.name}</span>
                    {item.quantity && <span style={{ fontSize: 11, color: BRAND.muted, marginLeft: 8, flexShrink: 0 }}>{item.quantity}</span>}
                  </div>
                  {item.note && <p style={{ fontSize: 12, color: BRAND.orange, margin: "3px 0 0", lineHeight: 1.4 }}>{item.note}</p>}
                </div>
              ))}
            </div>
          ))}

          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <button type="button" onClick={downloadShopList}
              style={{ ...S.btn, flex: 1 }}>
              Download List ↓
            </button>
            <button type="button" onClick={() => { setShopList(null); setShopMeals([]); setShopInput(""); }}
              style={{ ...S.btn, flex: 1, background: "transparent", border: "1.5px solid #333", color: BRAND.muted }}>
              Start Over
            </button>
          </div>
        </>
      )}
      <Nav />
    </div>
  );

  if (screen === "cookbook") return (
    <div style={S.screen}>
      <div style={S.header}>
        <div style={{ fontSize: 11, letterSpacing: "0.15em", color: BRAND.orange, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Maggie's Kitchen</div>
        <h1 style={S.h1}>Recipe Library</h1>
        <p style={S.sub}>Aligned meals. Real food. No compromise on flavor.</p>
      </div>
      <input style={{ ...S.input, marginBottom: 16 }} placeholder="Search recipes or tags…" value={cookbookSearch} onChange={e => setCookbookSearch(e.target.value)} />
      {filteredRecipes.length === 0
        ? <div style={{ ...S.card, textAlign: "center", padding: 40 }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📖</div>
            <p style={{ fontWeight: 800, color: BRAND.offwhite, fontSize: 16, marginBottom: 8 }}>Recipes Coming Soon</p>
            <p style={{ color: BRAND.muted, fontSize: 13, lineHeight: 1.6 }}>Maggie's cookbook is being added. Each recipe will show macros, ingredients, and goal tags.</p>
          </div>
        : filteredRecipes.map((r, i) => <CookbookCard key={i} recipe={r} />)
      }
      <Nav />
    </div>
  );

  return null;
}

// Root wrapper — PinGate's React.cloneElement only accepts a single child, so
// we wrap HamApp + CoachingCTA in one component. PinGate forwards pendingProfileCode
// to this wrapper, which passes it down to HamApp. CoachingCTA only mounts after
// PIN unlock since it lives inside the PinGate tree.
function HamRoot(props) {
  return (
    <React.Fragment>
      <HamApp {...props} />
      <CoachingCTA />
    </React.Fragment>
  );
}

ReactDOM.render(<PinGate><HamRoot /></PinGate>, document.getElementById("root"));
</script>
</body>
</html>
