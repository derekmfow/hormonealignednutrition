let _id = 100;
const uid = () => ++_id;

const BRAND = { dark: "#1A1A1A", orange: "#E8611A", offwhite: "#F5F0EB", muted: "#888" };

const GOALS = [
  { id: "fat_loss", label: "Fat Loss", desc: "Deficit · Lean swaps · High protein", icon: "🔥" },
  { id: "recomp",   label: "Recomp",   desc: "Maintenance · Quality upgrades",      icon: "⚖️" },
  { id: "gain",     label: "Build",    desc: "Surplus · Dense nutrition",            icon: "💪" },
];

const COOKBOOKS = [];

const MACRO_PROFILES = {
  fat_loss: { protein: 35, carbs: 40, fat: 25 },
  recomp:   { protein: 35, carbs: 40, fat: 25 },
  gain:     { protein: 35, carbs: 40, fat: 25 },
};

const GOAL_CAL_ADJUST = {
  fat_loss: cal => Math.round(cal * 0.80),
  recomp:   cal => Math.round(cal),
  gain:     cal => Math.round(cal * 1.10),
};

const ACTIVITY_MULTIPLIERS = { sedentary: 1.2, light: 1.375, moderate: 1.55, very: 1.725 };

function pctToGrams(pct, macro, cal) {
  return Math.round((cal * pct / 100) / (macro === "fat" ? 9 : 4));
}
function gramsToCalPct(g, macro, cal) {
  if (!cal) return 0;
  return Math.round((g * (macro === "fat" ? 9 : 4) / cal) * 100);
}

const DEREK_INGREDIENTS = `
DEREK'S APPROVED INGREDIENT LIST:
PROTEINS: 93/7 ground beef (grass-fed preferred, level 2), chicken breast, turkey, canned tuna (level 1), tuna steak (level 2), eggs, egg whites (fast-digesting, great for GLP-1), Greek yogurt full-fat or fat-free, kefir.

async function readScreenshotWithClaude(base64, mimeType) {
  // Android Chrome sometimes returns empty or non-standard mime types — normalize to jpeg
  const safeMime = (mimeType && ["image/jpeg","image/png","image/gif","image/webp"].includes(mimeType))
    ? mimeType : "image/jpeg";
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      system: `You are reading a nutrition tracking app screenshot. Your job is to extract every food item you can see.

Be aggressive — extract anything that looks like food, a meal name, or a calorie count.
- Look for section headers like Breakfast, Lunch, Dinner, Snacks, Meal 1, Pre-Workout, etc.
- Under each section, list every food item you can read, even partially
- If you can only read the food name but not the amount, just list the name
- If text is cut off, include whatever portion you can read
- Never return an empty meals array if you can see ANY food-related text

Output valid JSON only, no markdown, no explanation:
{ "meals": [{ "name": "Breakfast", "items": "6oz chicken breast, 1 cup oats, banana" }], "totals": { "calories": 0, "protein": 0, "carbs": 0, "fat": 0 } }

If you genuinely cannot see any food items at all, return: { "meals": [], "totals": { "calories": 0, "protein": 0, "carbs": 0, "fat": 0 } }`,
      messages: [{ role: "user", content: [
        { type: "image", source: { type: "base64", media_type: safeMime, data: base64 } },
        { type: "text", text: "Extract every food item and meal section you can see in this screenshot. Be thorough — include everything visible even if partially cut off." }
      ]}]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try {
    const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
    return parsed;
  }
  catch { return null; }
}

async function analyzeWithClaude(meals, goal, targets, medications) {
  const sys = `You are the AI coaching engine for Hormone Aligned Macros by Derek Fowler — 16-year nutrition and body composition coach specializing in clients on HRT or GLP-1 who lift weights.

CORE PHILOSOPHY:
- Standard nutrition advice was written for standard hormones. It does not apply here.
- MACRO COMPLIANCE IS THE FIRST AND ONLY PRIORITY. If a client is hitting their protein, carbs, fat, and calorie targets — that is a WIN. Full stop. Celebrate it.
- DO NOT suggest swaps if macros are on target. Swaps are only for when something is genuinely off.
- Derek's entire coaching method is gradual ingredient reduction: slowly moving clients from multi-ingredient processed meals toward fewer, single-ingredient whole foods — while keeping the meal intact and tasting good. This is a long-term process. Do not rush it.
- When macros are hitting and food quality could improve, you MAY offer one gentle optional suggestion framed as curiosity — never a correction. One suggestion max. Never more.
- If everything is aligned — macros hit, food quality is reasonable — output strong status and zero swaps. Just acknowledge the win.
- Never moralize around food. Never use the word "healthier." Use "less processed" instead.

PROTEIN RULES:
- Minimum 1g protein per lb bodyweight daily. In deficit: 1.1–1.3g per lb.
- Minimum 30g protein every ~4 hours. If ANY meal is under 30g, flag it as the FIRST priority.
- Never suggest cutting protein to hit calorie targets.

SWAP LOGIC BY GOAL:
- fat_loss: Lower-calorie protein swaps, reduce hidden fats, keep carbs around training, cleaner carb sources
- recomp: Move toward less processed versions; upgrade quality without drastically changing calories
- gain: Nutrient-dense calorie additions; quality fats or complex carbs only

HRT-SPECIFIC: Increased appetite first 1–3 months is normal especially on testosterone. Faster recovery = may need more carbs/protein. Don't aggressively cut calories while hormones stabilize.
GLP-1-SPECIFIC: Hunger signals pharmacologically suppressed — client CANNOT rely on hunger. Protein target MUST be hit even with zero appetite. Recommend fast-digesting proteins for low appetite. Avoid high-fat + high-volume meals together. Flag skipped meals.

${DEREK_INGREDIENTS}

DUAL SWAP FORMAT: Every swap must offer TWO options:
- swap_easy: Level 1 easy switch — familiar, accessible
- swap_clean: Level 2 less processed — single-ingredient or minimally processed
Only include swaps when something is genuinely misaligned. If macros are on target and food is reasonable, return empty swaps [].

OUTPUT valid JSON only, no markdown:
{
  "summary": "2–3 sentences. If macros on target lead with genuine congratulations like 'Protein locked in, macros on point. That is the whole game.' If macros off, lead with single most important fix. Never say healthier.",
  "flags": ["urgent issues only"],
  "score": { "protein": 0-100, "carbs": 0-100, "fat": 0-100, "overall": 0-100 },
  "meals": [
    {
      "meal": "meal name",
      "status": "needs_work | aligned | strong",
      "note": "1–2 sentences specific",
      "swaps": [
        {
          "swap_out": "ingredient",
          "why": "one sentence",
          "swap_easy": { "name": "...", "note": "...", "impact": "..." },
          "swap_clean": { "name": "...", "note": "...", "impact": "..." }
        }
      ]
    }
  ]
}`;

  const medsNote = medications?.length ? `Client protocols: ${medications.join(", ")}` : "No medications reported.";
  const msg = `Goal: ${goal}\nTargets: ${targets.protein}g protein, ${targets.carbs}g carbs, ${targets.fat}g fat (${targets.calories} cal)\n${medsNote}\n\nMeals:\n${meals.map((m,i) => `Meal ${i+1} — ${m.name}: ${m.items}`).join("\n")}\n\nAnalyze and return JSON.`;

  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2000, system: sys, messages: [{ role: "user", content: msg }] })
  });
  const data = await res.json();
  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try { return JSON.parse(text.replace(/```json|```/g, "").trim()); }
  catch { return null; }
}

// ── Components ────────────────────────────────────────────────────────────────

function Tag({ children, color = BRAND.orange }) {
  return <span style={{ background: color + "22", color, fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20, letterSpacing: "0.05em", textTransform: "uppercase" }}>{children}</span>;
}

function Toggle({ value, onChange, options }) {
  return (
    <div style={{ display: "inline-flex", background: "#252525", borderRadius: 8, padding: 3, gap: 2 }}>
      {options.map(o => (
        <button key={o.value} type="button" onClick={() => onChange(o.value)}
          style={{ padding: "5px 14px", borderRadius: 6, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 12, fontFamily: "Georgia,serif", background: value === o.value ? BRAND.orange : "transparent", color: value === o.value ? "#fff" : BRAND.muted, transition: "all 0.15s" }}>
          {o.label}
        </button>
      ))}
    </div>
  );
}

function MacroBar({ label, value, max, color }) {
  const w = Math.min(100, max > 0 ? Math.round((value / max) * 100) : 0);
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: BRAND.muted, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>{label}</span>
        <span style={{ fontSize: 12, color: BRAND.offwhite, fontWeight: 700 }}>{value}g <span style={{ color: BRAND.muted }}>/ {max}g</span></span>
      </div>
      <div style={{ height: 6, background: "#333", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${w}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}

function ScoreRing({ value, label }) {
  const r = 28, c = 2 * Math.PI * r, fill = c - (c * (value || 0) / 100);
  const color = value >= 80 ? "#4CAF82" : value >= 55 ? BRAND.orange : "#E84646";
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
      <svg width={70} height={70} viewBox="0 0 70 70">
        <circle cx={35} cy={35} r={r} fill="none" stroke="#333" strokeWidth={5} />
        <circle cx={35} cy={35} r={r} fill="none" stroke={color} strokeWidth={5}
          strokeDasharray={c} strokeDashoffset={fill} strokeLinecap="round"
          transform="rotate(-90 35 35)" style={{ transition: "stroke-dashoffset 0.8s ease" }} />
        <text x={35} y={39} textAnchor="middle" fill={color} fontSize={14} fontWeight={800}>{value ?? "—"}</text>
      </svg>
      <span style={{ fontSize: 11, color: BRAND.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</span>
    </div>
  );
}

function SwapCard({ swap }) {
  const sc = { needs_work: "#E84646", aligned: BRAND.orange, strong: "#4CAF82" };
  const [picked, setPicked] = useState(null);
  return (
    <div style={{ background: "#252525", borderRadius: 12, padding: 14, marginBottom: 10, borderLeft: `3px solid ${sc[swap.status] || BRAND.orange}` }}>
      <div style={{ marginBottom: 6 }}>
        <span style={{ fontWeight: 700, fontSize: 14, color: BRAND.offwhite }}>{swap.meal}</span>
      </div>
      <p style={{ fontSize: 12, color: BRAND.muted, margin: "0 0 12px", lineHeight: 1.5 }}>{swap.note}</p>
      {swap.swaps?.map((s, i) => (
        <div key={i} style={{ marginBottom: i < swap.swaps.length - 1 ? 14 : 0 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: "#E84646", textDecoration: "line-through", opacity: 0.75 }}>{s.swap_out}</span>
            <span style={{ fontSize: 12, color: BRAND.muted }}>— {s.why}</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button type="button" onClick={() => setPicked(picked === `${i}-easy` ? null : `${i}-easy`)}
              style={{ background: picked === `${i}-easy` ? "#2A3A2A" : "#1A1A1A", border: `1.5px solid ${picked === `${i}-easy` ? "#4CAF82" : "#333"}`, borderRadius: 10, padding: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: "#4CAF82", marginBottom: 4 }}>Easy Switch</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: BRAND.offwhite, marginBottom: 4, lineHeight: 1.3 }}>{s.swap_easy?.name}</div>
              <div style={{ fontSize: 11, color: BRAND.muted, lineHeight: 1.4, marginBottom: 6 }}>{s.swap_easy?.note}</div>
              <Tag color="#4CAF82">{s.swap_easy?.impact}</Tag>
            </button>
            <button type="button" onClick={() => setPicked(picked === `${i}-clean` ? null : `${i}-clean`)}
              style={{ background: picked === `${i}-clean` ? "#2A2A3A" : "#1A1A1A", border: `1.5px solid ${picked === `${i}-clean` ? BRAND.orange : "#333"}`, borderRadius: 10, padding: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: BRAND.orange, marginBottom: 4 }}>You could also try…</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: BRAND.offwhite, marginBottom: 4, lineHeight: 1.3 }}>{s.swap_clean?.name}</div>
              <div style={{ fontSize: 11, color: BRAND.muted, lineHeight: 1.4, marginBottom: 6 }}>{s.swap_clean?.note}</div>
              <Tag color={BRAND.orange}>{s.swap_clean?.impact}</Tag>
            </button>
          </div>
          {!picked?.startsWith(`${i}-`) && <p style={{ fontSize: 11, color: BRAND.muted, margin: "8px 0 0", textAlign: "center", fontStyle: "italic" }}>Tap either one — you pick.</p>}
          {picked?.startsWith(`${i}-`) && (
            <div style={{ marginTop: 8, padding: "8px 12px", background: "#1E1E1E", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 14 }}>{picked === `${i}-easy` ? "✓" : "⭐"}</span>
              <span style={{ fontSize: 12, color: BRAND.offwhite }}>{picked === `${i}-easy` ? "Easy switch noted. Solid move." : "Less processed version. Worth trying at least once."}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function CookbookCard({ recipe }) {
  return (
    <div style={{ background: "#252525", borderRadius: 12, padding: 16, marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <span style={{ fontWeight: 800, fontSize: 15, color: BRAND.offwhite, maxWidth: "70%" }}>{recipe.name}</span>
        <span style={{ fontSize: 12, color: BRAND.orange, fontWeight: 700 }}>{recipe.macros.calories} cal</span>
      </div>
      <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
        {["protein","carbs","fat"].map(m => <span key={m} style={{ fontSize: 12, color: BRAND.muted }}>{m[0].toUpperCase()}: <strong style={{ color: BRAND.offwhite }}>{recipe.macros[m]}g</strong></span>)}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{recipe.tags?.map(t => <Tag key={t}>{t}</Tag>)}</div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function HamApp() {
  const [screen, setScreen] = useState("setup");
  const [goal, setGoal] = useState("fat_loss");
  const [macroMode, setMacroMode] = useState("grams");
  const [targets, setTargets] = useState({ protein: 180, carbs: 130, fat: 60, calories: 1740 });
  const [pctTargets, setPctTargets] = useState({ protein: 40, carbs: 30, fat: 30 });
  const [medications, setMedications] = useState([]);
  const [meals, setMeals] = useState([
    { id: uid(), name: "Meal 1", items: "" },
    { id: uid(), name: "Meal 2", items: "" },
    { id: uid(), name: "Meal 3", items: "" },
  ]);
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [scanLoading, setScanLoading] = useState(false);
  const [error, setError] = useState(null);
  const [scanError, setScanError] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [cookbookSearch, setCookbookSearch] = useState("");
  const [stats, setStats] = useState({ age: "", weight: "", height_ft: "", height_in: "", sex: "male" });
  const [activity, setActivity] = useState("moderate");
  const [tdee, setTdee] = useState(null);
  const fileRef = useRef(null);

  const MED_OPTIONS = ["HRT — Testosterone", "HRT — Estrogen / Progesterone", "GLP-1 (Ozempic / Wegovy / Mounjaro)", "Other peptide protocol"];
  const toggleMed = m => setMedications(p => p.includes(m) ? p.filter(x => x !== m) : [...p, m]);

  const applyGoalDefaults = (g, currentTdee) => {
    const p = MACRO_PROFILES[g];
    // If TDEE is known, apply goal-adjusted calories; otherwise keep current calories
    const baseTdee = currentTdee || tdee;
    const cal = baseTdee
      ? (GOAL_CAL_ADJUST[g] || (c => c))(baseTdee)
      : (targets.calories || 1800);
    setPctTargets({ protein: p.protein, carbs: p.carbs, fat: p.fat });
    setTargets({ calories: cal, protein: pctToGrams(p.protein,"protein",cal), carbs: pctToGrams(p.carbs,"carbs",cal), fat: pctToGrams(p.fat,"fat",cal) });
  };
  const handleCalorieChange = cal => {
    const c = +cal || 0;
    setTargets({ calories: c, protein: pctToGrams(pctTargets.protein,"protein",c), carbs: pctToGrams(pctTargets.carbs,"carbs",c), fat: pctToGrams(pctTargets.fat,"fat",c) });
  };
  const handleGramChange = (macro, val) => {
    const v = +val || 0;
    setTargets(t => ({ ...t, [macro]: v }));
    setPctTargets(p => ({ ...p, [macro]: gramsToCalPct(v, macro, targets.calories) }));
  };
  const handlePctChange = (macro, val) => {
    const v = +val || 0;
    setPctTargets(p => ({ ...p, [macro]: v }));
    setTargets(t => ({ ...t, [macro]: pctToGrams(v, macro, t.calories) }));
  };

  const calcTDEE = () => {
    const { age, weight, height_ft, height_in, sex } = stats;
    if (!age || !weight || height_ft === "") return;
    const wKg = parseFloat(weight) * 0.453592;
    const hCm = (parseFloat(height_ft) * 12 + parseFloat(height_in || 0)) * 2.54;
    const a = parseFloat(age);
    const bmr = sex === "male" ? 10*wKg + 6.25*hCm - 5*a + 5 : 10*wKg + 6.25*hCm - 5*a - 161;
    const tdeeVal = Math.round(bmr * ACTIVITY_MULTIPLIERS[activity]);
    setTdee(tdeeVal);
    applyGoalDefaults(goal, tdeeVal);
  };

  const addMeal = () => setMeals(m => [...m, { id: uid(), name: `Meal ${m.length + 1}`, items: "" }]);
  const updateMeal = (id, f, v) => setMeals(m => m.map(x => x.id === id ? { ...x, [f]: v } : x));
  const removeMeal = id => setMeals(m => m.filter(x => x.id !== id));

  const processFiles = useCallback(async files => {
    // Android Chrome sometimes reports no mime type — include those files too, we'll normalize inside
    const images = Array.from(files).filter(f => f.type.startsWith("image/") || f.type === "" || f.name?.match(/\.(jpg|jpeg|png|webp|gif|heic)$/i));
    if (!images.length) { setScanError("No image files found. Make sure you're selecting a screenshot from your photo library."); return; }
    setScanError(null); setScanLoading(true);
    try {
      const results = await Promise.all(images.map(async file => {
        const b64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.onerror = () => rej(new Error("Could not read file"));
          r.readAsDataURL(file);
        });
        return readScreenshotWithClaude(b64, file.type);
      }));
      const allMeals = results.flatMap(r => r?.meals || []).map(m => ({ id: uid(), name: m.name, items: m.items }));
      // If nothing came back at all, throw — but partial results are fine
      if (!allMeals.length) {
        // Check if any result came back non-null (means it read but found no food)
        const anyRead = results.some(r => r !== null);
        throw new Error(anyRead ? "No meals found in screenshot" : "Failed to read screenshot");
      }
      setMeals(prev => {
        const existing = prev.filter(m => m.items.trim().length > 0);
        const existingNames = new Set(existing.map(m => m.name.toLowerCase().trim()));
        const toAdd = allMeals.filter(m => !existingNames.has(m.name.toLowerCase().trim()));
        const merged = [...existing, ...toAdd];
        return merged.length > 0 ? merged : prev;
      });
    } catch (err) {
      const msg = err?.message || "";
      if (msg.includes("No meals found")) {
        setScanError("Screenshot was read but no food items were found. Try scrolling so the meal list fills the screen, then screenshot again.");
      } else if (msg.includes("API error 400")) {
        setScanError("Image format not supported. Open the screenshot in your gallery, tap Share → Save as, then try again.");
      } else if (msg.includes("Failed to read")) {
        setScanError("Could not read the image. Try taking a fresh screenshot and uploading that instead of one saved from another app.");
      } else {
        setScanError("Something went wrong reading that screenshot. Try again — if it keeps failing, type the meals in manually.");
      }
    }
    setScanLoading(false);
  }, []);

  const onDrop = useCallback(e => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files?.length) processFiles(e.dataTransfer.files); }, [processFiles]);

  const analyze = async () => {
    const filled = meals.filter(m => m.items.trim().length > 2);
    if (!filled.length) { setError("Add at least one meal first."); return; }
    setError(null); setLoading(true);
    try {
      const data = await analyzeWithClaude(filled, goal, targets, medications);
      if (!data) throw new Error();
      setResults(data); setScreen("results");
    } catch { setError("Something went wrong. Try again."); }
    setLoading(false);
  };

  const filteredRecipes = COOKBOOKS.filter(r => !cookbookSearch || r.name.toLowerCase().includes(cookbookSearch.toLowerCase()) || r.tags?.some(t => t.includes(cookbookSearch.toLowerCase())));

  const S = {
    screen: { maxWidth: 480, margin: "0 auto", padding: "0 16px 100px", minHeight: "100vh", background: BRAND.dark },
    header: { paddingTop: 28, paddingBottom: 20 },
    label: { fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: BRAND.muted, marginBottom: 6, display: "block" },
    input: { width: "100%", background: "#252525", border: "1px solid #333", borderRadius: 10, padding: "12px 14px", color: BRAND.offwhite, fontSize: 14, boxSizing: "border-box", outline: "none" },
    btn: { width: "100%", padding: 16, background: BRAND.orange, color: "#fff", border: "none", borderRadius: 12, fontSize: 16, fontWeight: 800, letterSpacing: "0.03em", cursor: "pointer" },
    card: { background: "#1E1E1E", borderRadius: 14, padding: 18, marginBottom: 16 },
    h1: { fontSize: 26, fontWeight: 800, color: BRAND.offwhite, margin: 0, letterSpacing: "-0.02em" },
    sub: { fontSize: 13, color: BRAND.muted, margin: 0 },
    tab: a => ({ flex: 1, padding: "10px 0", background: a ? BRAND.orange : "#1E1E1E", color: a ? "#fff" : BRAND.muted, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, borderRadius: 8, transition: "all 0.2s" }),
  };

  const Nav = () => (
    <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#141414", borderTop: "1px solid #2A2A2A", display: "flex", padding: "8px 16px 16px", gap: 8, zIndex: 100 }}>
      {[["setup","⚙️","Setup"],["log","📝","Log"],["results","✦","Results"],["cookbook","📖","Recipes"]].map(([s,icon,lbl]) => (
        <button key={s} type="button" onClick={() => setScreen(s)} style={S.tab(screen === s)}>
          <div style={{ fontSize: 18, lineHeight: 1 }}>{icon}</div>
          <div style={{ fontSize: 10, marginTop: 2 }}>{lbl}</div>
        </button>
      ))}
    </div>
  );

  // ── SETUP ─────────────────────────────────────────────────────────────────
  if (screen === "setup") return (
    <div style={S.screen}>
      <div style={S.header}>
        <div style={{ fontSize: 11, letterSpacing: "0.15em", color: BRAND.orange, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Free The Macro</div>
        <h1 style={S.h1}>Hormone Aligned<br />Macros</h1>
        <p style={{ ...S.sub, marginTop: 6 }}>Set your goal. Log meals. Get two swap options. You pick.</p>
      </div>

      {/* TDEE Calculator */}
      <div style={S.card}>
        <span style={S.label}>Calculate Your Calories</span>
        <p style={{ fontSize: 12, color: BRAND.muted, margin: "0 0 14px", lineHeight: 1.5 }}>Mifflin-St Jeor formula. Fill in your stats and we'll set your target automatically.</p>
        <div style={{ marginBottom: 12 }}>
          <span style={S.label}>Biological Sex</span>
          <div style={{ display: "flex", gap: 8 }}>
            {["male","female"].map(s => (
              <button type="button" key={s} onClick={() => setStats(st => ({ ...st, sex: s }))}
                style={{ flex: 1, padding: 10, borderRadius: 10, border: `1.5px solid ${stats.sex === s ? BRAND.orange : "#333"}`, background: stats.sex === s ? BRAND.orange+"22" : "#252525", color: stats.sex === s ? BRAND.orange : BRAND.offwhite, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                {s.charAt(0).toUpperCase() + s.slice(1)}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <div>
            <span style={S.label}>Age</span>
            <input style={S.input} type="number" placeholder="35" value={stats.age} onChange={e => setStats(s => ({ ...s, age: e.target.value }))} />
          </div>
          <div>
            <span style={S.label}>Weight (lbs)</span>
            <input style={S.input} type="number" placeholder="185" value={stats.weight} onChange={e => setStats(s => ({ ...s, weight: e.target.value }))} />
          </div>
        </div>
        <div style={{ marginBottom: 12 }}>
          <span style={S.label}>Height</span>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <input style={S.input} type="number" placeholder="Feet" value={stats.height_ft} onChange={e => setStats(s => ({ ...s, height_ft: e.target.value }))} />
            <input style={S.input} type="number" placeholder="Inches" value={stats.height_in} onChange={e => setStats(s => ({ ...s, height_in: e.target.value }))} />
          </div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <span style={S.label}>Activity Level</span>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[["sedentary","Sedentary — desk job, little movement"],["light","Lightly Active — 1–3 days/week"],["moderate","Moderately Active — 3–5 days/week"],["very","Very Active — 6–7 days/week"]].map(([key, label]) => (
              <button type="button" key={key} onClick={() => setActivity(key)}
                style={{ padding: "10px 12px", borderRadius: 10, border: `1.5px solid ${activity === key ? BRAND.orange : "#333"}`, background: activity === key ? BRAND.orange+"22" : "#252525", color: activity === key ? BRAND.orange : BRAND.offwhite, fontWeight: activity === key ? 700 : 400, fontSize: 13, cursor: "pointer", textAlign: "left" }}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <button type="button" onClick={calcTDEE}
          style={{ ...S.btn, background: "#252525", border: `1.5px solid ${BRAND.orange}`, color: BRAND.orange, padding: 13 }}>
          Calculate My Targets
        </button>
        {tdee && (() => {
          const goalCal = (GOAL_CAL_ADJUST[goal] || (c=>c))(tdee);
          const adjLabel = { fat_loss: "20% deficit", recomp: "maintenance", gain: "10% surplus" }[goal];
          return (
            <div style={{ marginTop: 14, padding: 14, background: "#252525", borderRadius: 10, borderLeft: `3px solid ${BRAND.orange}` }}>
              <div style={{ display: "flex", justifyContent: "space-around", marginBottom: 10 }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: BRAND.muted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>Maintenance</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: BRAND.offwhite }}>{tdee}</div>
                  <div style={{ fontSize: 10, color: BRAND.muted }}>cal / day</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", color: BRAND.muted, fontSize: 20 }}>→</div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: BRAND.orange, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>{adjLabel}</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: BRAND.orange }}>{goalCal}</div>
                  <div style={{ fontSize: 10, color: BRAND.muted }}>your target</div>
                </div>
              </div>
              <p style={{ fontSize: 11, color: BRAND.muted, margin: 0, lineHeight: 1.5 }}>Calories and macros auto-filled below. Adjust anytime.</p>
            </div>
          );
        })()}
      </div>

      {/* Goal */}
      <div style={S.card}>
        <span style={S.label}>Your Goal</span>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {GOALS.map(g => (
            <button type="button" key={g.id} onClick={() => { setGoal(g.id); applyGoalDefaults(g.id); }}
              style={{ background: goal === g.id ? BRAND.orange+"22" : "#252525", border: `1.5px solid ${goal === g.id ? BRAND.orange : "#333"}`, borderRadius: 10, padding: "12px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12, textAlign: "left" }}>
              <span style={{ fontSize: 22 }}>{g.icon}</span>
              <div>
                <div style={{ fontWeight: 800, color: goal === g.id ? BRAND.orange : BRAND.offwhite, fontSize: 14 }}>{g.label}</div>
                <div style={{ fontSize: 12, color: BRAND.muted }}>{g.desc}</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Medications */}
      <div style={S.card}>
        <span style={S.label}>Medications / Protocols</span>
        <p style={{ fontSize: 12, color: BRAND.muted, margin: "0 0 12px", lineHeight: 1.5 }}>Select all that apply. Improves swap recommendations.</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {MED_OPTIONS.map(med => (
            <button type="button" key={med} onClick={() => toggleMed(med)}
              style={{ background: medications.includes(med) ? BRAND.orange+"22" : "#252525", border: `1.5px solid ${medications.includes(med) ? BRAND.orange : "#333"}`, borderRadius: 10, padding: "10px 14px", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ width: 16, height: 16, borderRadius: 4, border: `2px solid ${medications.includes(med) ? BRAND.orange : "#555"}`, background: medications.includes(med) ? BRAND.orange : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 11, color: "#fff" }}>{medications.includes(med) ? "✓" : ""}</span>
              <span style={{ fontSize: 13, color: medications.includes(med) ? BRAND.orange : BRAND.offwhite, fontWeight: medications.includes(med) ? 700 : 400 }}>{med}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Macro Targets */}
      <div style={S.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={{ ...S.label, margin: 0 }}>Daily Targets</span>
          <Toggle value={macroMode} onChange={setMacroMode} options={[{ value: "grams", label: "Grams" }, { value: "percent", label: "%" }]} />
        </div>
        <div style={{ marginBottom: 12 }}>
          <span style={S.label}>Calories</span>
          <input style={S.input} type="number" value={targets.calories} onChange={e => handleCalorieChange(e.target.value)} placeholder="e.g. 1800" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          {["protein","carbs","fat"].map(m => (
            <div key={m}>
              <span style={S.label}>{m.charAt(0).toUpperCase()+m.slice(1)} {macroMode === "grams" ? "(g)" : "(%)"}</span>
              {macroMode === "grams"
                ? <input style={S.input} type="number" value={targets[m]} onChange={e => handleGramChange(m, e.target.value)} />
                : <input style={S.input} type="number" value={pctTargets[m]} onChange={e => handlePctChange(m, e.target.value)} min={0} max={100} />
              }
            </div>
          ))}
        </div>
        <div style={{ marginTop: 12, padding: "10px 12px", background: "#252525", borderRadius: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            {["protein","carbs","fat"].map(m => (
              <div key={m} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: BRAND.offwhite }}>{targets[m]}g</div>
                <div style={{ fontSize: 11, color: BRAND.muted }}>{gramsToCalPct(targets[m], m, targets.calories)}%</div>
                <div style={{ fontSize: 10, color: BRAND.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>{m}</div>
              </div>
            ))}
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: BRAND.orange }}>{targets.calories}</div>
              <div style={{ fontSize: 11, color: BRAND.muted }}>—</div>
              <div style={{ fontSize: 10, color: BRAND.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>cal</div>
            </div>
          </div>
        </div>
        <p style={{ fontSize: 11, color: BRAND.muted, marginTop: 10, lineHeight: 1.5 }}>Auto-filled from goal. Grams and % stay in sync.</p>
      </div>

      <button type="button" style={S.btn} onClick={() => setScreen("log")}>Start Logging Meals →</button>
      <Nav />
    </div>
  );

  // ── LOG ────────────────────────────────────────────────────────────────────
  if (screen === "log") return (
    <div style={S.screen}>
      <div style={S.header}>
        <h1 style={S.h1}>Today's Meals</h1>
        <p style={S.sub}>Type meals or drop a tracking app screenshot.</p>
      </div>
      <div onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={onDrop} onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragOver ? BRAND.orange : "#444"}`, borderRadius: 14, padding: "22px 16px", textAlign: "center", marginBottom: 20, cursor: "pointer", background: dragOver ? BRAND.orange+"0A" : "#1A1A1A", transition: "all 0.2s" }}>
        <input ref={fileRef} type="file" accept="image/jpeg,image/jpg,image/png,image/webp,image/*" multiple style={{ display: "none" }} onChange={e => { if (e.target.files?.length) processFiles(e.target.files); e.target.value = ""; }} />
        {scanLoading
          ? <><div style={{ fontSize: 28, marginBottom: 8 }}>⏳</div><p style={{ color: BRAND.orange, fontWeight: 700, fontSize: 14, margin: 0 }}>Reading your log…</p><p style={{ color: BRAND.muted, fontSize: 12, margin: "4px 0 0" }}>Reading all screenshots in parallel…</p></>
          : <><div style={{ fontSize: 28, marginBottom: 8 }}>📱</div><p style={{ color: BRAND.offwhite, fontWeight: 700, fontSize: 14, margin: 0 }}>Drop MFP screenshot here</p><p style={{ color: BRAND.muted, fontSize: 12, margin: "4px 0 0" }}>Tap to choose from your photo library — select multiple at once</p></>
        }
      </div>
      {scanError && <div style={{ background: "#E8464622", border: "1px solid #E84646", borderRadius: 10, padding: "10px 14px", color: "#E84646", fontSize: 13, marginBottom: 12 }}>{scanError}</div>}
      {meals.map(meal => (
        <div key={meal.id} style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <input value={meal.name} onChange={e => updateMeal(meal.id, "name", e.target.value)}
              style={{ ...S.input, flex: 1, marginRight: 10, padding: "8px 12px", fontSize: 15, fontWeight: 700, background: "transparent", border: "none", borderBottom: "1px solid #333" }} />
            {meals.length > 1 && <button type="button" onClick={() => removeMeal(meal.id)} style={{ background: "none", border: "none", color: BRAND.muted, cursor: "pointer", fontSize: 18, padding: 4 }}>✕</button>}
          </div>
          <textarea value={meal.items} onChange={e => updateMeal(meal.id, "items", e.target.value)}
            placeholder="e.g. 6oz chicken breast, 1 cup white rice, broccoli, 1 tsp olive oil"
            rows={3} style={{ ...S.input, resize: "vertical", lineHeight: 1.6 }} />
        </div>
      ))}
      <button type="button" onClick={addMeal} style={{ ...S.btn, background: "transparent", border: `1.5px dashed ${BRAND.orange}`, color: BRAND.orange, marginBottom: 12 }}>+ Add Meal</button>
      {error && <div style={{ background: "#E8464622", border: "1px solid #E84646", borderRadius: 10, padding: "12px 14px", color: "#E84646", fontSize: 13, marginBottom: 12 }}>{error}</div>}
      <button type="button" style={{ ...S.btn, opacity: loading ? 0.7 : 1 }} onClick={analyze} disabled={loading}>{loading ? "Analyzing…" : "Analyze My Meals ✦"}</button>
      <div style={{ ...S.card, marginTop: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ ...S.label, margin: 0 }}>Today's Target</span>
          <span style={{ fontSize: 12, color: BRAND.orange, fontWeight: 700 }}>{targets.calories} cal</span>
        </div>
        <MacroBar label="Protein" value={targets.protein} max={targets.protein} color="#4CAF82" />
        <MacroBar label="Carbs" value={targets.carbs} max={targets.carbs} color={BRAND.orange} />
        <MacroBar label="Fat" value={targets.fat} max={targets.fat} color="#9B6EE8" />
        {medications.length > 0 && <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 4 }}>{medications.map(m => <Tag key={m}>{m}</Tag>)}</div>}
      </div>
      <Nav />
    </div>
  );

  // ── RESULTS ────────────────────────────────────────────────────────────────
  if (screen === "results") return (
    <div style={S.screen}>
      <div style={S.header}>
        <h1 style={S.h1}>Meal Analysis</h1>
        <p style={S.sub}>Two options per swap. You pick.</p>
      </div>
      {!results
        ? <div style={{ ...S.card, textAlign: "center", padding: 40 }}>
            <p style={{ color: BRAND.muted, fontSize: 14 }}>No analysis yet.</p>
            <button type="button" style={{ ...S.btn, marginTop: 16, width: "auto", padding: "12px 24px" }} onClick={() => setScreen("log")}>Log Meals →</button>
          </div>
        : <>
            <div style={{ ...S.card, borderLeft: `3px solid ${BRAND.orange}` }}>
              <p style={{ color: BRAND.offwhite, fontSize: 14, lineHeight: 1.7, margin: 0 }}>{results.summary}</p>
            </div>
            {results.flags?.length > 0 && (
              <div style={{ ...S.card, borderLeft: "3px solid #E84646" }}>
                <span style={{ ...S.label, color: "#E84646", marginBottom: 8, display: "block" }}>⚠ Flags</span>
                {results.flags.map((f,i) => <div key={i} style={{ fontSize: 13, color: "#F5C0C0", marginBottom: 4, paddingLeft: 4 }}>• {f}</div>)}
              </div>
            )}
            {results.score && (
              <div style={S.card}>
                <span style={S.label}>Macro Alignment Score</span>
                <div style={{ display: "flex", justifyContent: "space-around", paddingTop: 8 }}>
                  <ScoreRing value={results.score.protein} label="Protein" />
                  <ScoreRing value={results.score.carbs} label="Carbs" />
                  <ScoreRing value={results.score.fat} label="Fat" />
                  <ScoreRing value={results.score.overall} label="Overall" />
                </div>
              </div>
            )}
            <div style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
                <span style={S.label}>Meal-by-Meal</span>
                <span style={{ fontSize: 11, color: BRAND.muted, fontStyle: "italic" }}>Two options. You pick.</span>
              </div>
              {results.meals?.map((m,i) => <SwapCard key={i} swap={m} />)}
            </div>
            <button type="button" style={S.btn} onClick={() => { setResults(null); setMeals([{id:uid(),name:"Meal 1",items:""},{id:uid(),name:"Meal 2",items:""},{id:uid(),name:"Meal 3",items:""}]); setScreen("log"); }}>
              Start a New Day
            </button>
          </>
      }
      <Nav />
    </div>
  );

  // ── COOKBOOK ──────────────────────────────────────────────────────────────
  if (screen === "cookbook") return (
    <div style={S.screen}>
      <div style={S.header}>
        <div style={{ fontSize: 11, letterSpacing: "0.15em", color: BRAND.orange, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Maggie's Kitchen</div>
        <h1 style={S.h1}>Recipe Library</h1>
        <p style={S.sub}>Aligned meals. Real food. No compromise on flavor.</p>
      </div>
      <input style={{ ...S.input, marginBottom: 16 }} placeholder="Search recipes or tags…" value={cookbookSearch} onChange={e => setCookbookSearch(e.target.value)} />
      {filteredRecipes.length === 0
        ? <div style={{ ...S.card, textAlign: "center", padding: 40 }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📖</div>
            <p style={{ fontWeight: 800, color: BRAND.offwhite, fontSize: 16, marginBottom: 8 }}>Recipes Coming Soon</p>
            <p style={{ color: BRAND.muted, fontSize: 13, lineHeight: 1.6 }}>Maggie's cookbook is being added. Each recipe will show macros, ingredients, and goal tags.</p>
          </div>
        : filteredRecipes.map((r,i) => <CookbookCard key={i} recipe={r} />)
      }
      <Nav />
    </div>
  );

  return null;
}

ReactDOM.render(<HamApp />, document.getElementById("root"));
</script>
</body>
</html>
